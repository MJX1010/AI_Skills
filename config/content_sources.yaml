## 使用说明

### 方法一：修改本配置文件
1. 编辑此文件添加/修改搜索关键词
2. 添加推荐的 RSS/网站来源
3. 运行收集脚本时会读取此配置

### 方法二：直接添加链接
使用链接收集器直接添加文章：
```bash
python skills/link-collector/scripts/collect_links.py --url "文章链接" --kb ai-latest-news
```

### 方法三：手动编辑周刊
直接编辑 Markdown 文件：
- `memory/ai-content/weekly/weekly-YYYY-WXX.md`
- `memory/game-content/weekly/game-weekly-YYYY-WXX.md`
- `memory/health-content/weekly/health-weekly-YYYY-WXX.md`
