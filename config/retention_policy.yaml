# 内容保留策略配置
# 自动清理旧文件，只保留指定时间范围的内容

---
# 日报保留策略
daily_retention:
  days: 7  # 保留最近7天
  enabled: true

# 周刊保留策略
weekly_retention:
  days: 30  # 保留最近30天（约1个月）
  enabled: true

# 实时内容策略
realtime_sync:
  save_local: false  # 不保存本地，直接同步飞书
  sync_to_feishu: true

# 清理设置
cleanup:
  # 每天收集后自动清理
  auto_cleanup_after_collect: true
  # 保留空目录
  keep_empty_dirs: false
