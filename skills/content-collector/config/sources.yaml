# 知识库内容收集配置
# 位置: skills/content-collector/config/sources.yaml
# 可自定义搜索关键词和来源

---

# 🤖 AI最新资讯
ai-latest-news:
  search_queries:
    # AI 大公司动态
    - "OpenAI GPT-5 GPT-4 ChatGPT 最新发布"
    - "Claude Anthropic 新功能 更新"
    - "Google Gemini DeepMind AI 2026"
    - "xAI Grok Elon Musk 人工智能"
    - "Microsoft Copilot Azure AI 微软"
    - "Meta Llama AI 模型发布"
    
    # 国内AI动态
    - "百度文心一言 阿里通义千问 字节豆包"
    - "国产大模型 阿里 腾讯 华为 AI"
    
    # 行业资讯
    - "人工智能 AI 融资 投资 独角兽"
    - "生成式AI AIGC 应用落地"
    - "AI大模型 技术突破 论文"
    - "量子位 机器之心 新智元 AI资讯"
  
  # 权威来源域名（用于质量评分）
  authoritative_sources:
    # 国际AI公司官网
    - "openai.com"
    - "chatgpt.com"
    - "anthropic.com"
    - "claude.ai"
    - "deepmind.google"
    - "google.com"
    - "x.ai"
    - "arxiv.org"
    - "ai.google"
    - "microsoft.com"
    - "meta.ai"
    # 国内科技媒体
    - "qbitai.com"        # 量子位
    - "36kr.com"          # 36氪
    - "huxiu.com"         # 虎嗅网
    - "ifanr.com"         # 爱范儿
    - "sspai.com"         # 少数派
    - "zhihu.com"         # 知乎
    - "jiqizhixin.com"    # 机器之心
    - "csdn.net"          # CSDN
    - "aijishu.com"       # 新智元
    - "chaping.cn"        # 差评
    - "appso.com"         # Appso
    - "infoq.cn"          # InfoQ
    - "geekpark.net"      # 极客公园
  
  # RSS订阅源
  rss_feeds:
    - name: "量子位"
      url: "https://www.qbitai.com/feed"
    - name: "机器之心"
      url: "https://www.jiqizhixin.com/rss"

# 🎮 游戏开发
game-development:
