    - "sspai.com"         # 少数派
    - "zhihu.com"         # 知乎
    - "gcores.com"        # 机核网
    - "indienova.com"     # indienova
    - "taptap.com"        # TapTap
    - "gamelook.com.cn"   # Gamelook
