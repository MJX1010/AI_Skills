# 知识库内容收集配置
# 位置: skills/content-collector/config/sources.yaml
# 可自定义搜索关键词和来源

---

# 🤖 AI最新资讯
ai-latest-news:
  search_queries:
    - "OpenAI GPT-5 Claude Anthropic 最新"
    - "Google Gemini AI 2026 发布"
    - "人工智能大模型 LLM 突破"
    - "ChatGPT 新功能 更新"
  
  authoritative_sources:
    - "openai.com"
    - "anthropic.com"
    - "deepmind.google"
    - "arxiv.org"
    - "ai.google"
  
  rss_feeds:
    - name: "OpenAI Blog"
      url: "https://openai.com/blog/rss.xml"
    - name: "Anthropic News"
      url: "https://www.anthropic.com/news/rss.xml"

# 🎮 游戏开发
game-development:
  search_queries:
    - "Unity 2026 新功能 更新"
    - "Unreal Engine 5 游戏开发"
    - "Godot 引擎 独立游戏"
    - "GameDev 游戏设计"
  
  authoritative_sources:
    - "unity.com"
    - "unrealengine.com"
    - "godotengine.org"
    - "gamasutra.com"

# 🌱 健康生活
healthy-living:
  search_queries:
    - "健康生活 科学饮食 2026"
    - "运动健身 锻炼方法"
    - "心理健康 压力管理"
    - "生活妙招 小窍门"
  
  authoritative_sources:
    - "dxy.com"
    - "丁香医生"
    - "健康中国"

# 通用设置
settings:
  quality_thresholds:
    min_confidence: 0.4
    authoritative_bonus: 0.2
    hot_topic_threshold: 0.8
  
  # 搜索设置
  search:
    time_range: "1w"  # 1w=一周, 1d=一天, 1m=一月
    count_per_query: 10
    timeout: 60
