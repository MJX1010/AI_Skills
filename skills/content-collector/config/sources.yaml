# 🌱 健康生活
healthy-living:
  search_queries:
    # 运动健身
    - "运动健身 锻炼方法 增肌减脂"
    - "跑步 瑜伽 游泳 健身计划"
    - "HIIT 有氧运动 力量训练"
    
    # 饮食营养
    - "健康饮食 营养搭配 食谱"
    - "减肥饮食 减脂餐 轻食"
    - "蛋白质 碳水 维生素 补充"
    
    # 心理健康
    - "心理健康 压力管理 情绪调节"
    - "冥想 正念 焦虑 抑郁"
    - "睡眠质量 失眠 改善睡眠"
    
    # 生活技巧
    - "生活妙招 小窍门 实用技巧"
    - "健康养生 中医 保健"
  
  authoritative_sources:
    - "dxy.com"           # 丁香医生
    - "healthtimes.cn"    # 健康时报
    - "guokr.com"         # 果壳
    - "lifetimes.cn"      # 生命时报
    - "sspai.com"         # 少数派
    - "zhihu.com"         # 知乎
    - "linux.do"          # Linux.do 生活方式板块

# 通用设置
settings:
  quality_thresholds:
    min_confidence: 0.4
    authoritative_bonus: 0.2
    hot_topic_threshold: 0.8
  
  # 搜索设置
  search:
    time_range: "1w"  # 1w=一周, 1d=一天, 1m=一月
    count_per_query: 10
    timeout: 60
